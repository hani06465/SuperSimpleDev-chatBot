<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput(){

        const [inputText,setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }
        function sendMessage(){
            console.log(inputText);
        }
        return (
          <>
            <input 
            placeholder="Send a message to Chatbot" 
            size="30"
            onChange={saveInputText}
          />
            <button
              onClick={sendMessage}

            >Send</button>
          </>
        );
      }
      
      function ChatMessage({message,sender}){
      // const message = props.message;
      // const sender = props.sender;
      // const {message,sender} = props;
       
        return (
          <div>
            {sender === "robot" && (
              <img src="robot.png" width="50px"/>
            )}
            {message}
            {sender ==="user" && (
              <img src="user.png" width="50px" />
            )}
          </div>
        );
      }

      function ChatMessages() {
        const [chatMessages,setChatMessages] = React.useState(
          [{
          message : "hello chatbot", 
          sender:"user",
          id:'id1',
        },{
          message : "Hello! How can i help you?", 
          sender:"robot",
           id:'id2',
        },{
          message :"can you get me today's date",
          sender:"user",
           id:'id3',
        },{
            message: "Today is semptember 27" ,
            sender:"robot",
             id:'id4',
        }]);
        
        //const chatMessages = array[0]; // gives all the data in the state
        //const setChatMessages = array[1]; // this gives us a functin that will update the data in the array[0]
        function sendmessage(){
          setChatMessages([
            ...chatMessages,
            {
              message:'test',
              sender: 'user',
              id: crypto.randomUUID(),
            }
          ]);// this updates the data in way it all replaces with the new data so if we want the old data we have to make a copy of it.

         
        }
       
        return (
          <>
     
            <button onClick={sendmessage}>Send message </button>
            {chatMessages.map((chatMessage) => {
                      return (
                      
                        <ChatMessage 
                            message = {chatMessage.message} // if we use double quote here it saves it as string not the value of it.
                            sender = {chatMessage.sender}
                            key = {chatMessage.id}
                        />
                        );
                    })}
          </>
        );
              

      }

      function App(){
       

        
        return(
          <>
            <ChatInput />
            <ChatMessages />
            
          </>
        );
      }
       
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
